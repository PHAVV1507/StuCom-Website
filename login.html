<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* BACKGROUND */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right,#1e73be,#9fc3e8);
}

/* NAVBAR */
.nav{
    position:absolute;
    top:10px;
    left:20px;
    font-size:14px;
}
.nav a{
    text-decoration:none;
    color:black;
    margin-right:10px;
}

/* MAIN BOX */
.container{
    width:650px;                  
    max-width:90%;
    background:#eee;
    border-radius:8px;
    display:flex;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* LEFT SIDE (LOGO) */
.left{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.left img{
    width:160px;
}

/* RIGHT SIDE (FORM) */
.right{
    flex:1;
    padding-left:20px;
}

.right h2{
    text-align:center;
    margin-bottom:20px;
}

/* INPUT BOX */
.input-box{
    background:#dcdcdc;
    border-radius:25px;
    padding:12px 15px;
    margin:10px 0;
    display:flex;
    align-items:center;
}

.input-box i{
    margin-right:10px;
    color:#555;
}

.input-box input{
    border:none;
    background:none;
    outline:none;
    width:100%;
    font-size:14px;
}

/* LOGIN BUTTON */
.login-btn{
    width:100%;
    padding:12px;
    background:#9ec3e6;
    border:none;
    border-radius:25px;
    margin-top:15px;
    font-weight:bold;
    cursor:pointer;
}

/* LINKS */
.links{
    text-align:center;
    font-size:13px;
    margin-top:10px;
}

.links a{
    text-decoration:none;
    color:#333;
}

.links span{
    color:#888;
}

/* RESPONSIVE */
@media (max-width:768px){

    .container{
        flex-direction:column;
        width:90%;
        padding:20px;
    }

    .right{
        padding-left:0;
    }

    .left img{
        width:120px;
        margin-bottom:20px;
    }

}
</style>

</head>

<body>

<!-- NAVIGATION -->
<div class="nav">
    <a href="index.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="schedule.html">Schedule</a>
    <a href="register_course.html">Register Course</a>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <img src="logo.png"> 
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>Student Login</h2>

        <div class="input-box">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="NRIC">
        </div>

        <div class="input-box">
            <i class="fa fa-lock"></i>
            <input type="password" placeholder="Password">
        </div>

        <div class="links">
            <a href="#">Forgot Password</a>
        </div>

        <!-- LOGIN LINK -->
        <button class="login-btn" onclick="location.href='index.html'">LOGIN</button>

        <div class="links">
            <span>Not a Member? → </span>
            <!-- SIGNUP LINK -->
            <a href="register.html">Signup Now</a>
        </div>
    </div>

</div>

</body>
</html>
